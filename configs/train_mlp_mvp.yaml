seed: 42

data:
  dataset_path: data/raw/vkid_mvp.npz
  context_lengths: [5, 10, 20, 50, 100, 200]
  train_context_min: 5
  train_context_max: 200
  queries_per_context: 64

model:
  latent_dim: 8
  input_dim: 5
  state_dim: 3
  action_dim: 2
  d_model: 64
  transformer_layers: 2
  transformer_heads: 4
  transformer_ff_dim: 256
  dropout: 0.1
  mlp_hidden_dim: 128
  mlp_layers: 3

loss:
  beta_kl: 0.001
  lambda_consistency: 0.1
  triplet_margin: 1.0
  use_nll: false

train:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0
  checkpoint_dir: outputs/checkpoints/mlp_mvp
  log_dir: outputs/logs/mlp_mvp
