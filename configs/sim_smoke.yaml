seed: 7

dataset:
  name: vkid_smoke
  output_path: data/raw/vkid_smoke.npz
  conditions: 2
  sequences_per_condition: 1
  sequence_length_s: 3.0
  sample_rate_hz: 20.0
  train_condition_fraction: 0.5

vehicle:
  wheelbase_m: 2.7
  vx0_kmh_range: [50.0, 80.0]
  lf_ratio_range: [0.45, 0.55]
  mass_kg_range: [1200.0, 2000.0]
  iz_kgm2_range: [1500.0, 3500.0]

tire:
  b_range: [8.0, 14.0]
  c_range: [1.0, 1.6]
  d_range: [0.5, 1.1]
  e_range: [-1.5, 0.5]

action:
  steer_cutoff_hz: 0.8
  steer_amplitude_deg_range: [3.0, 10.0]
  fx_cutoff_hz: 0.4
  fx_amplitude_n_range: [1500.0, 2500.0]
  event_probability: 0.25

sanity:
  max_attempts_per_sequence: 8
  min_vx_kmh: 12.0
  max_abs_vy_kmh: 45.0
  max_abs_yaw_rate_deg_s: 80.0
